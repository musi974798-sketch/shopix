<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-amber: #FFBF00;
            --dark-amber: #E6AC00;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text-main: #1a1a1a;
            --text-muted: #6b7280;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .otp-card {
            background: #ffffff;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            text-align: center;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Icon Styling */
        .icon-box {
            width: 64px;
            height: 64px;
            background: #fffbeb;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
        }

        .icon-box svg {
            width: 32px;
            height: 32px;
            color: var(--primary-amber);
        }

        .otp-card h2 {
            margin: 0 0 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .otp-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .error-message {
            background: #fef2f2;
            color: #991b1b;
            padding: 0.875rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            border: 1px solid #fee2e2;
            font-weight: 500;
        }

        /* Professional OTP Input Styling */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 1.5rem;
            letter-spacing: 0.8rem;
            /* Spacing out the digits */
            text-align: center;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            background: #f9fafb;
            font-weight: 600;
        }

        input[type="text"]:focus {
            border-color: var(--primary-amber);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 191, 0, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-amber);
            color: #000;
            /* Dark text on amber is often more readable/professional */
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(255, 191, 0, 0.2);
        }

        button:hover {
            background-color: var(--dark-amber);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(255, 191, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .resend-container {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid #f3f4f6;
            padding-top: 1.5rem;
        }

        .resend-link {
            color: var(--dark-amber);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .resend-link:hover {
            color: #b38600;
            text-decoration: underline;
        }

        .timer {
            font-weight: 600;
            color: var(--text-main);
        }
    </style>
</head>

<body>

    <div class="otp-card">
        <div class="icon-box">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                </path>
            </svg>
        </div>

        <h2>Check your email</h2>
        <p>We’ve sent a temporary verification code to your inbox. Enter the code below to secure your account.</p>

        {% if messages %}
        <div class="error-messages">
            {% for message in messages %}
            <div class="error-message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="otp" placeholder="000000" inputmode="numeric" pattern="\d{6}" maxlength="6"
                    autocomplete="one-time-code" required>
            </div>
            <button type="submit">Verify Identity</button>
        </form>

        <div class="resend-container">
            Didn't receive the code?
            <span id="timer-text">Wait <span class="timer" id="countdown">00:59</span></span>
            <a href="#" id="resend-link" class="resend-link" style="display:none;">Resend Code</a>
        </div>
    </div>

    <script>
        let timeLeft = 59;
        const countdownElem = document.getElementById('countdown');
        const timerText = document.getElementById('timer-text');
        const resendLink = document.getElementById('resend-link');

        const timer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerText.style.display = 'none';
                resendLink.style.display = 'inline';
            } else {
                let seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
                countdownElem.innerHTML = `00:${seconds}`;
            }
            timeLeft -= 1;
        }, 1000);
    </script>

</body>

</html>
